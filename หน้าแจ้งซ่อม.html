<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการงานแจ้งซ่อม - Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --c1: #CCD5AE; --c2: #E9EDC9; --c3: #FEFAE0; --c4: #FAEDCD; --c5: #D4A373;
            --text: #555; --pending: #e67e22; --processing: #3498db; --completed: #27ae60; --urgent: #e74c3c;
        }
        body { font-family: 'Sarabun', sans-serif; background: var(--c3); padding: 20px; color: var(--text); margin: 0; }
        .container { max-width: 1100px; margin: auto; }
        .header-brand { text-align: center; margin-bottom: 30px; }
        .header-brand h1 { color: var(--c5); margin: 0; font-size: 32px; font-weight: 600; }
        
        /* Stats Bar */
        .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-item { background: white; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-bottom: 4px solid #ddd; }
        .stat-item div { font-size: 28px; font-weight: bold; margin-top: 5px; }
        .stat-item.st-total { border-color: var(--c5); }
        .stat-item.st-pending { border-color: var(--pending); color: var(--pending); }
        .stat-item.st-processing { border-color: var(--processing); color: var(--processing); }
        .stat-item.st-done { border-color: var(--completed); color: var(--completed); }

        .main-card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,.05); }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--c2); padding: 15px; font-size: 14px; }
        td { padding: 15px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        
        .badge { padding: 5px 12px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; }
        .pending { background: var(--pending); }
        .processing { background: var(--processing); }
        .completed { background: var(--completed); }
        
        .btn-manage { background: var(--c2); border: none; padding: 8px 12px; border-radius: 10px; cursor: pointer; font-weight: bold; font-family: 'Sarabun'; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-brand">
        <h1><i class="fas fa-tools"></i> ระบบจัดการงานแจ้งซ่อม (Real-time)</h1>
    </div>

    <div class="stats-bar">
        <div class="stat-item st-total"><span>งานทั้งหมด</span><div id="countTotal">0</div></div>
        <div class="stat-item st-pending"><span>รอดำเนินการ</span><div id="countPending">0</div></div>
        <div class="stat-item st-processing"><span>กำลังซ่อม</span><div id="countProcessing">0</div></div>
        <div class="stat-item st-done"><span>เสร็จสิ้น</span><div id="countDone">0</div></div>
    </div>

    <div class="main-card">
        <table>
            <thead>
                <tr>
                    <th>เลขห้อง</th>
                    <th>หัวข้อปัญหา</th>
                    <th>สถานะ</th>
                    <th>วันที่แจ้ง</th>
                    <th>จัดการ</th>
                </tr>
            </thead>
            <tbody id="repairTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // ฟังก์ชันหลักในการดึงข้อมูล
    async function loadData() {
        try {
            const response = await fetch('http://localhost:3000/api/tasks');
            const data = await response.json();

            // 1. อัปเดตตัวเลขสถิติข้างบน
            document.getElementById('countTotal').innerText = data.length;
            document.getElementById('countPending').innerText = data.filter(t => t.status === 'pending').length;
            document.getElementById('countProcessing').innerText = data.filter(t => t.status === 'processing').length;
            document.getElementById('countDone').innerText = data.filter(t => t.status === 'completed').length;

            // 2. แสดงข้อมูลในตาราง
            const tableBody = document.getElementById('repairTableBody');
            tableBody.innerHTML = ''; 

            data.forEach(item => {
                // เลือกสี Badge ตามสถานะ
                let statusClass = item.status; 
                let statusText = item.status === 'pending' ? 'รอดำเนินการ' : 
                                 item.status === 'processing' ? 'กำลังซ่อม' : 'เสร็จสิ้น';

                tableBody.innerHTML += `
                    <tr>
                        <td><b>${item.room}</b></td>
                        <td style="text-align:left;">${item.title}</td>
                        <td><span class="badge ${statusClass}">${statusText}</span></td>
                        <td>${new Date(item.created_at).toLocaleDateString('th-TH')}</td>
                        <td><button class="btn-manage" onclick="alert('ID: ${item.id}')">จัดการ</button></td>
                    </tr>`;
            });
        } catch (error) {
            console.error('เชื่อมต่อ Server ไม่ได้:', error);
            document.getElementById('repairTableBody').innerHTML = '<tr><td colspan="5">เชื่อมต่อ Database ไม่สำเร็จ (เช็ค Node.js)</td></tr>';
        }
    }

    // รันทันทีที่เปิดหน้า
    window.onload = loadData;
</script>

</body>
</html>
